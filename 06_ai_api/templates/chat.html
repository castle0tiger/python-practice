<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI 챗봇</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            background-color: #2c7be5;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-messages {
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }

        .msg-user {
            text-align: right;
            margin: 10px 0;
        }

        .msg-user span {
            background-color: #2c7be5;
            color: white;
            padding: 10px 16px;
            border-radius: 18px 18px 4px 18px;
            display: inline-block;
            max-width: 70%;
        }

        .msg-ai {
            text-align: left;
            margin: 10px 0;
        }

        .msg-ai span {
            background-color: #f0f2f5;
            color: #333;
            padding: 10px 16px;
            border-radius: 18px 18px 18px 4px;
            display: inline-block;
            max-width: 70%;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .chat-input button {
            padding: 12px 24px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">AI 챗봇</div>

        <div class="chat-messages">
            {% for msg in conversation %}
                {% if msg.role == "user" %}
                    <div class="msg-user"><span>{{ msg.content }}</span></div>
                {% elif msg.role == "assistant" %}
                    <div class="msg-ai"><span>{{ msg.content }}</span></div>
                {% endif %}
            {% endfor %}
        </div>

        <form action="/chat" method="POST" class="chat-input">
            <input type="text" name="message" placeholder="메시지를 입력하세요">
            <button type="submit">전송</button>
        </form>
    </div>
</body>
</html>
