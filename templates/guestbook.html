<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>방명록</title>
</head>
<body>
    <h1>방명록</h1>

    <form action="/add" method="POST">
        <p>이름: <input type="text" name="name"></p>
        <p>메시지: <input type="text" name="message"></p>
        <button type="submit">등록</button>
    </form>

    <h2>등록된 메시지</h2>
    {% for row in rows %}
        <p>{{ row[0] }}. {{ row[1] }} : {{ row[2] }}</p>
    {% endfor %}
</body>
</html>
