<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>카페 매출 대시보드</title>
</head>
<body>
    <h2>카테고리별 분석</h2>
    <table border="1">
        <tr>
            <th>카테고리</th>
            <th>총매출 합계</th>
            <th>판매수량 합계</th>
        </tr>
        {% for row in summary_table %}
        <tr>
            <td>{{ row.카테고리 }}</td>
            <td>{{ row.총매출 }}</td>
            <td>{{ row.판매수량 }}</td>
        </tr>
        {% endfor %}
    </table>
    <h2>카테고리별 총매출 차트</h2>
    <img src="/static/chart.png">
</body>
</html>
