<!DOCTYPE html>
<html>
<head>
    <title>AI 챗봇</title>
</head>
<body>
    <h1>AI 챗봇</h1>

    <input type="text" id="name_input" placeholder="이름">
    <input type="text" id="score_input" placeholder="점수">
    <button onclick="send()">전송</button>
    
    <div id="msg_list"></div>

    <script>
        async function send() {
            const nameBox = document.getElementById("name_input");
            const scoreBox = document.getElementById("score_input");
            
            if (nameBox.value === "" || scoreBox.value === "") {
                return;
            }
            
            const response = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: nameBox.value, score: scoreBox.value, absence: 0 })
            });
            
            const data = await response.json();
            const list = document.getElementById("msg_list");
            list.innerHTML += "<p>" + nameBox.value + " : " + data["판정"] + "</p>";
            nameBox.value = "";
            scoreBox.value = "";
        }    
    </script>
</body>
</html>
